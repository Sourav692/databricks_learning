<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6B7280"/>
    </marker>
    <marker id="aho" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#FF3621"/>
    </marker>
    <marker id="ahg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#00A972"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="560" fill="#FAFAF9"/>
  <text x="24" y="34" font-size="20" font-weight="700" fill="#1B3139">Azure Databricks Serverless Networking — NCC, Egress Control &amp; Storage Patterns</text>
  <text x="24" y="54" font-size="12" fill="#6B7280">Compute runs in the Databricks account · you secure path ③ by service identity + deny-by-default egress, never by IP</text>

  <!-- User -->
  <rect x="30" y="250" width="120" height="56" rx="8" fill="#fff" stroke="#2272B4" stroke-width="2"/>
  <text x="90" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#2272B4">User / BI / REST</text>
  <text x="90" y="293" text-anchor="middle" font-size="10" fill="#6B7280">browser · JDBC · CLI</text>

  <!-- Databricks-owned account -->
  <rect x="200" y="74" width="430" height="412" rx="12" fill="#fff" stroke="#1B3139" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="415" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#1B3139">Databricks-owned Azure account (Databricks-managed)</text>

  <rect x="224" y="112" width="382" height="78" rx="8" fill="#FFF4F2" stroke="#FF3621" stroke-width="2"/>
  <text x="415" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#FF3621">Control plane</text>
  <text x="415" y="156" text-anchor="middle" font-size="10" fill="#4A5860">web app · REST · Unity Catalog · SQL/job/cluster mgrs</text>
  <text x="415" y="170" text-anchor="middle" font-size="10" fill="#4A5860">metadata + orchestration only</text>

  <!-- serverless plane -->
  <rect x="224" y="206" width="382" height="104" rx="8" fill="#F4FBF8" stroke="#00A972" stroke-width="1.5"/>
  <text x="415" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#00A972">Serverless compute plane (elastic pool · dynamic IPs)</text>
  <rect x="244" y="238" width="160" height="58" rx="8" fill="#fff" stroke="#00A972" stroke-width="2"/>
  <text x="324" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#00A972">Serverless workload</text>
  <text x="324" y="278" text-anchor="middle" font-size="9.5" fill="#4A5860">SQL · jobs · notebooks · ML</text>
  <rect x="418" y="238" width="170" height="58" rx="8" fill="#fff" stroke="#b4690e" stroke-width="2"/>
  <text x="503" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#b4690e">Network policy (egress)</text>
  <text x="503" y="273" text-anchor="middle" font-size="9.5" fill="#7a4c08">deny-by-default · 5.3</text>
  <text x="503" y="287" text-anchor="middle" font-size="9.5" fill="#7a4c08">"am I allowed at all?"</text>

  <!-- NCC -->
  <rect x="224" y="326" width="382" height="48" rx="8" fill="#fff" stroke="#2272B4" stroke-width="2"/>
  <text x="415" y="346" text-anchor="middle" font-size="12" font-weight="700" fill="#2272B4">NCC — Network Connectivity Configuration (account-level, regional · 5.2)</text>
  <text x="415" y="362" text-anchor="middle" font-size="9.5" fill="#4A5860">stable service tag (backbone)  ·  private endpoint rules  ·  "how do I reach you privately?"</text>

  <!-- credential broker -->
  <rect x="224" y="392" width="382" height="44" rx="8" fill="#fff" stroke="#6B7280" stroke-width="1.5"/>
  <text x="415" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3139">Credential broker — vends 1-hour scoped token (auth layer · 5.4)</text>
  <text x="415" y="427" text-anchor="middle" font-size="9.5" fill="#4A5860">UC checks grants → per-workload token, expires in ~1 hour</text>

  <!-- Customer subscription -->
  <rect x="668" y="120" width="268" height="380" rx="12" fill="#fff" stroke="#2272B4" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="802" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#2272B4">YOUR Azure subscription (same region)</text>

  <rect x="692" y="158" width="220" height="58" rx="8" fill="#fff" stroke="#6B7280" stroke-width="1.5"/>
  <text x="802" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3139">NSP (service-tag firewall)</text>
  <text x="802" y="196" text-anchor="middle" font-size="9.5" fill="#4A5860">allow AzureDatabricksServerless.&lt;region&gt;</text>
  <text x="802" y="209" text-anchor="middle" font-size="9.5" fill="#4A5860">Transition mode</text>

  <rect x="692" y="230" width="220" height="50" rx="8" fill="#fff" stroke="#2272B4" stroke-width="2"/>
  <text x="802" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#2272B4">Private endpoint NIC</text>
  <text x="802" y="266" text-anchor="middle" font-size="9.5" fill="#4A5860">FQDN → private IP (dfs / blob)</text>

  <rect x="692" y="296" width="220" height="64" rx="8" fill="#F4FBF8" stroke="#00A972" stroke-width="2"/>
  <text x="802" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#00A972">ADLS Gen2</text>
  <text x="802" y="336" text-anchor="middle" font-size="9.5" fill="#4A5860">&lt;acct&gt;.dfs.core.windows.net</text>
  <text x="802" y="350" text-anchor="middle" font-size="9.5" fill="#4A5860">governed by Unity Catalog</text>

  <rect x="692" y="376" width="220" height="56" rx="8" fill="#fff" stroke="#6B7280" stroke-width="1.5"/>
  <text x="802" y="398" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3139">Access Connector</text>
  <text x="802" y="414" text-anchor="middle" font-size="9.5" fill="#4A5860">managed identity (auth, not network)</text>

  <!-- Path 1: user -> control plane -->
  <path d="M150 268 C 180 230, 200 165, 222 152" fill="none" stroke="#6B7280" stroke-width="2" marker-end="url(#ah)"/>
  <text x="40" y="225" font-size="11" font-weight="600" fill="#1B3139">① user → Databricks</text>
  <text x="40" y="240" font-size="9.5" fill="#6B7280">443 · IP ACL / front-end PL</text>

  <!-- Path 2 internal backbone -->
  <path d="M415 206 L 415 190" fill="none" stroke="#00A972" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ahg)"/>
  <text x="430" y="202" font-size="9.5" fill="#00A972">② backbone + TLS (managed, not configurable)</text>

  <!-- Path 3 B: service tag -> NSP -->
  <path d="M606 286 C 650 250, 660 210, 690 192" fill="none" stroke="#00A972" stroke-width="2" marker-end="url(#ahg)"/>
  <text x="612" y="248" font-size="9.5" font-weight="700" fill="#00A972">B: service tag</text>
  <text x="612" y="261" font-size="9" fill="#00A972">(backbone, free)</text>

  <!-- Path 3 C: PE -->
  <path d="M606 350 C 645 320, 660 280, 690 258" fill="none" stroke="#2272B4" stroke-width="2" marker-end="url(#ah)"/>
  <text x="616" y="312" font-size="9.5" font-weight="700" fill="#2272B4">C: private endpt</text>

  <!-- NSP -> ADLS -->
  <path d="M802 216 L 802 294" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- PE -> ADLS -->
  <path d="M860 280 C 875 288, 875 288, 862 296" fill="none" stroke="#2272B4" stroke-width="1.5"/>
  <!-- Access connector -> ADLS (auth) -->
  <path d="M802 376 L 802 362" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ah)"/>

  <!-- Legend -->
  <rect x="30" y="360" width="150" height="120" rx="8" fill="#fff" stroke="#E5E7EB"/>
  <text x="40" y="380" font-size="11" font-weight="700" fill="#1B3139">Legend</text>
  <line x1="40" y1="394" x2="64" y2="394" stroke="#00A972" stroke-width="2"/>
  <text x="70" y="398" font-size="9.5" fill="#4A5860">backbone (service tag)</text>
  <line x1="40" y1="410" x2="64" y2="410" stroke="#2272B4" stroke-width="2"/>
  <text x="70" y="414" font-size="9.5" fill="#4A5860">private endpoint</text>
  <line x1="40" y1="426" x2="64" y2="426" stroke="#00A972" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="70" y="430" font-size="9.5" fill="#4A5860">managed (not config'd)</text>
  <line x1="40" y1="442" x2="64" y2="442" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="70" y="446" font-size="9.5" fill="#4A5860">auth (not network)</text>
  <text x="40" y="466" font-size="8.5" fill="#6B7280">Two locks: network AND auth.</text>
</svg>
